<!DOCTYPE html>
<html>
<head>
    <!-- Metadatos Open Graph (imprescindibles para WhatsApp, Facebook, etc.) -->
    <meta property="og:title" content="Estás invitado 🎉">
    <meta property="og:description" content="Toca para ver nuestra invitación">
    <meta property="og:image" content="https://andresrivera45.github.io/andresyshirleyboda/invitationi.png">
    <meta property="og:image:type" content="image/png">
    <!-- Tamaño recomendado para una buena visualización en redes -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://andresrivera45.github.io/andresyshirleyboda/">
    
    <!-- Redirección automática a tu invitación de Canva -->
    <meta http-equiv="refresh" content="0; url=https://andresyshirleyboda.my.canva.site/">

    <!-- Título de la pestaña del navegador (por si acaso) -->
    <title>Invitación Andres y Shirley</title>
</head>
<body>
    <!-- Contenido visible solo si la redirección falla o es muy lenta -->
    <p>Redirigiendo a la invitación...</p>
    <!-- Enlace directo a la imagen por si alguien llega aquí sin ser redirigido -->
    <p>Si no eres redirigido automáticamente, <a href="https://andresyshirleyboda.my.canva.site/">haz clic aquí</a>.</p>
    
    <!-- Imagen de respaldo: esto asegura que incluso si la redirección es instantánea, 
         al abrir el enlace en una pestaña, se muestre la invitación visualmente. 
         Es un detalle profesional para mejorar la experiencia. -->
    <img src="https://andresrivera45.github.io/andresyshirleyboda/invitationi.png" 
         alt="Invitación Andres y Shirley" 
         style="width:100%; max-width:600px; display:block; margin:auto;">
</body>
</html>
